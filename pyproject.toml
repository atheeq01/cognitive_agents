[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["apps/api"]
asyncio_mode = "auto"
markers = [
    "smoke: Quick sanity checks (< 5s each)",
    "unit: Isolated unit tests with mocks",
    "api: API integration tests using TestClient",
    "db: Database tests requiring PostgreSQL",
    "slow: Tests that take > 10s",
]
filterwarnings = [
    "ignore::DeprecationWarning:google.*",
    "ignore::RuntimeWarning:aiohttp.*",
]

[tool.coverage.run]
source = ["apps/api/app", "apps/worker/app"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.pyright]
extraPaths = ["apps/api", "apps/worker"]
